# DigitalOcean App Platform — WebsConnect
# Deploy: DO Dashboard → Apps → Create App → GitHub repo OR upload this spec
# Docs: https://docs.digitalocean.com/products/app-platform/reference/app-spec/

name: websconnect
region: blr

services:
  - name: web
    dockerfile_path: Dockerfile
    source_dir: /
    git:
      repo_clone_url: https://github.com/selfdevelope09-hue/WebsConnect.git
      branch: main
    instance_count: 1
    instance_size_slug: basic-xxs
    http_port: 3000
    routes:
      - path: /
    envs:
      - key: ROOT_DOMAIN
        value: websconnect.in
      - key: DATABASE_URL
        scope: RUN_TIME
        type: SECRET
        value: ${websconnect-db.DATABASE_URL}
      - key: GOOGLE_CLIENT_ID
        scope: RUN_TIME
        type: SECRET
        value: ""
      - key: SESSION_SECRET
        scope: RUN_TIME
        type: SECRET
        value: "websconnect-session-change-me"
      - key: OPENROUTER_API_KEY
        scope: RUN_TIME
        type: SECRET
        value: ""
      - key: OPENROUTER_MODEL
        value: "google/gemini-2.5-flash"

databases:
  - name: websconnect-db
    engine: PG
    version: "16"
    production: false

domains:
  - domain: websconnect.in
    type: PRIMARY
  - domain: www.websconnect.in
    type: ALIAS
  - domain: api.websconnect.in
    type: ALIAS
  - domain: "*.websconnect.in"
    type: WILDCARD
